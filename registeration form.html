<!DOCTYPE html>
<html>
    <body bgcolor="bisque">
        <center>
            <h1>STUDENT REGISTRATION FORM</h1>
        </center>
    <form>
        <label style="margin-right: 85px;"><b>Roll no.:</b></label>
        <input type="text"  style="width: 430px; height: 30px; border: 1px solid  black;"><br><br>
<label style="margin-right: 44px;"><b>Student name:</b></label>
        <div style="display: inline-block; margin-right: 20px;">
            <input type="text" placeholder="Firstname" style=" width: 200px; height: 30px; border: 1px solid  black;">
        </div>
        <div style="display: inline-block; margin-right: 20px;">
            <input type="text" placeholder="Lastname" style="width: 200px; height: 30px; border: 1px solid  black;">
        </div><br><br>
        <div style="display: inline-block; margin-right: 8px;">
    <label style="margin-right: 85px;"><b>Father's Name:</b></label>
        <input type="text"  style="width: 430px; height: 30px; border: 1px solid  black;"><br><br>
<label style="margin-right: 50px;"><b>Date of birth:</b></label>
 <div style="display: inline-block; margin-right: 5px;">
            <input type="text" placeholder="Day" style=" width: 60px; height: 30px; border: 1px solid  black;">
            <span>-</span>
        </div>
        <div style="display: inline-block; margin-right: 5px;">
            <input type="text" placeholder="Month" style=" width: 60px; height: 30px; border: 1px solid  black;">
            <span>-</span>
        </div>
<div style="display: inline-block; margin-right: 5px;">
            <input type="text" placeholder="Year" style="width: 100px; height: 30px; border: 1px solid  black;">
            <span><i>(DD-MM-YYYY)</i></span>
        </div><br><br>
<label style="margin-right: 65px;"><b>Mobile no.:</b></label>
        <div style="display: inline-block; margin-right: 8px;">
            <input type="text" placeholder="+91" style=" width: 60px; height: 30px; border: 1px solid  black;">
            <span>-</span>
        </div>
        <div style="display: inline-block; margin-right: 8px;">
            <input type="text"  style="width: 345px; height: 30px; border: 1px solid  black;">
        </div><br><br>
        <label style="margin-right: 80px;"><b>Email id:</b></label>
        <input type="text"  style="width: 433px; height: 30px; border: 1px solid  black;"><br><br>
        <label style="margin-right: 73px;"><b>Password:</b></label>
        <input type="text"  style="width: 433px; height: 30px; border: 1px solid  black;"><br><br>
      <label style="margin-right: 80px;"><b>Gender:</b></label>
        <input type="radio" name="rate" value="Male">Male
        <input type="radio" name="rate" value="Female">Female<br><br> 
         <label style="margin-right: 50px;"><b>Department:</b></label>
         <input type="checkbox" name="service" value="CSE">CSE
        <input type="checkbox" name="service" value="IT">IT
        <input type="checkbox" name="service" value="ECE">ECE
        <input type="checkbox" name="service" value="Civil">Civil
        <input type="checkbox" name="service" value="Mech">Mech<br><br>
       <label style="margin-right: 88px;"><b>Course:</b></label> 
<select>
  <option value="" disabled selected>--------------------------------Select Current Course's-------------------------------</option>
  <option value="CSE">Computer Science and Engineering</option>
  <option value="ECE">Electronics and Communication Engineering </option>
  <option value="IT">Information Technology</option>
  <option value="Civil">Civil Engineering </option>
  <option value="Mech">Mechanical Engineering</option>
</select><br><br>
       <label style="margin-right: 40px;"><b>Student Photo:</b></label>
        <input type="file"><br><br>
         <label style="margin-right: 108px;"><b>City:</b></label>
        <input type="text"  style="width: 433px; height: 30px; border: 1px solid  black;"><br><br>
        <div style="display: flex; align-items: center; ">
       <label style="margin-right: 80px;"><b>Address:</b></label>
        <textarea type="text" placeholder="Type here..." rows="7" cols="57" style="border: 1px solid  black;"></textarea></div><br><br>
<center>
        <input type="Submit" value="Register">
        </center>
    </form>
    </body>
</html>
